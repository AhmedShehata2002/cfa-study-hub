<style>
  :root{
    --ink:#FFFFFF; --slate:#F7F7F4; --slate-2:#EEEDE6;
    --parchment:#1C1B17; --parchment-dim:#767468;
    --brass:#06B6A0; --brass-dim:#048C7F;
    --sage:#16A34A; --clay:#F43F5E; --rule:#E4E2D8; --flame:#FF7A29; --sky:#2F7DE0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:var(--ink);color:var(--parchment);font-family:'IBM Plex Sans',system-ui,sans-serif;display:flex;justify-content:center;}
  .shell{width:100%;max-width:420px;min-height:100vh;display:flex;flex-direction:column;position:relative;padding-bottom:78px;}
  .scroll{flex:1;padding:24px 18px 12px;overflow-y:auto;}
  h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:600;margin:0;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass);}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .topbar h1{font-size:24px;}
  .streakchip{display:flex;align-items:center;gap:6px;background:var(--slate);border:1px solid var(--rule);border-radius:20px;padding:6px 12px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--flame);}
  .card{background:var(--slate);border:1px solid var(--rule);border-radius:12px;padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(28,27,23,.04);}
  label{display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--brass-dim);margin-bottom:8px;}
  input[type=text],input[type=date],textarea,select{width:100%;background:var(--slate-2);border:1px solid var(--rule);border-radius:6px;color:var(--parchment);font-family:'IBM Plex Sans',sans-serif;font-size:14px;padding:12px;resize:vertical;}
  textarea{min-height:100px;}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--brass-dim);}
  .btn{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em;text-transform:uppercase;background:var(--brass);color:#fff;border:none;border-radius:8px;padding:14px 20px;cursor:pointer;font-weight:600;width:100%;text-align:center;transition:transform .1s;}
  .btn:active{transform:scale(.97);}
  .btn.secondary{background:transparent;border:1px solid var(--rule);color:var(--parchment-dim);}
  .btn.small{padding:9px 14px;width:auto;font-size:11px;}
  .btn:disabled{opacity:.35;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .ringwrap{display:flex;align-items:center;gap:16px;}
  .ring{width:72px;height:72px;flex-shrink:0;}
  .ring circle{fill:none;stroke-width:7;}
  .ring .bg{stroke:var(--rule);}
  .ring .fg{stroke:var(--brass);stroke-linecap:round;transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset .4s ease;}
  .ringlabel .big{font-family:'IBM Plex Mono',monospace;font-size:22px;color:var(--parchment);}
  .ringlabel .small{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--parchment-dim);text-transform:uppercase;letter-spacing:.06em;}
  .hourshint{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--sky);margin-top:10px;}
  .subheat{display:flex;flex-direction:column;gap:4px;overflow-x:auto;}
  .subheat-row{display:flex;align-items:center;gap:4px;}
  .subheat-label{width:32px;flex-shrink:0;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--parchment-dim);}
  .subheat-cells{display:flex;gap:3px;}
  .subheat-cell{width:15px;height:15px;border-radius:3px;background:var(--rule);flex-shrink:0;}
  .subheat-cell.l1{background:#B2EDE3;} .subheat-cell.l2{background:#66D4C0;} .subheat-cell.l3{background:#1FAE95;} .subheat-cell.l4{background:var(--brass);}
  .subheat-legend{display:flex;align-items:center;gap:5px;margin-top:10px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--parchment-dim);}

  .path-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:14px;}
  .path-chip{flex-shrink:0;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.04em;
    padding:7px 13px;border-radius:16px;border:1px solid var(--rule);color:var(--parchment-dim);cursor:pointer;background:var(--slate-2);}
  .path-chip.active{background:var(--brass);color:#fff;border-color:var(--brass);}
  .path-wrap{position:relative;margin:0 auto;}
  @keyframes nodeIn{0%{opacity:0;transform:translate(-50%,-50%) scale(.5);}100%{opacity:1;transform:translate(-50%,-50%) scale(1);}}
  @keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(6,182,160,.35);}70%{box-shadow:0 0 0 12px rgba(6,182,160,0);}100%{box-shadow:0 0 0 0 rgba(6,182,160,0);}}
  .path-node{position:absolute;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;cursor:pointer;transform:translate(-50%,-50%);
    border:2px solid var(--rule);background:var(--slate-2);color:var(--parchment-dim);box-shadow:0 2px 5px rgba(28,27,23,.1);
    animation:nodeIn .45s cubic-bezier(.34,1.56,.64,1) backwards;transition:transform .15s;}
  .path-node:active{transform:translate(-50%,-50%) scale(.92);}
  .path-node.complete{background:var(--sage);border-color:var(--sage);color:#fff;font-size:18px;}
  .path-node.in_progress{background:var(--brass);border-color:var(--brass);color:#fff;
    animation:nodeIn .45s cubic-bezier(.34,1.56,.64,1) backwards, pulseRing 2.2s infinite;}
  .path-node-label{position:absolute;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--parchment-dim);
    width:128px;text-align:center;line-height:1.3;transform:translateX(-50%);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .area{border-bottom:1px solid var(--rule);}
  .area:last-child{border-bottom:none;}
  .area-head{display:flex;justify-content:space-between;align-items:center;padding:14px 0;cursor:pointer;}
  .area-head .name{font-family:'Fraunces',Georgia,serif;font-size:16px;}
  .area-head .meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--parchment-dim);margin-top:2px;}
  .area-progress{width:100%;height:4px;background:var(--rule);border-radius:2px;margin-top:6px;overflow:hidden;}
  .area-progress .fill{height:100%;background:var(--brass);}
  .reading-list{padding:0 0 12px;display:none;}
  .reading-list.open{display:block;}
  .reading-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;padding-left:8px;border-left:2px solid var(--rule);margin-bottom:2px;cursor:pointer;}
  .reading-item .rname{font-size:13px;}
  .pill{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:10px;flex-shrink:0;margin-left:8px;}
  .pill.not_started{background:rgba(118,116,104,.10);color:var(--parchment-dim);}
  .pill.in_progress{background:rgba(255,122,41,.14);color:var(--flame);}
  .pill.complete{background:rgba(22,164,74,.13);color:var(--sage);}
  .chevron{transition:transform .15s;display:inline-block;}
  .chevron.open{transform:rotate(90deg);}
  .backlink{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--parchment-dim);margin-bottom:16px;cursor:pointer;display:inline-block;}
  .statuspills{display:flex;gap:8px;margin-bottom:16px;}
  .statuspill{flex:1;text-align:center;padding:10px 4px;border-radius:8px;border:1px solid var(--rule);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;color:var(--parchment-dim);}
  .statuspill.active.not_started{border-color:var(--parchment-dim);color:var(--parchment);}
  .statuspill.active.in_progress{border-color:var(--flame);color:var(--flame);}
  .statuspill.active.complete{border-color:var(--sage);color:var(--sage);}
  .ledger{display:flex;gap:5px;margin-bottom:20px;}
  .ledger .tick{flex:1;height:6px;border-radius:2px;background:var(--rule);}
  .ledger .tick.correct{background:var(--sage);} .ledger .tick.wrong{background:var(--clay);} .ledger .tick.current{background:var(--brass);}
  .qcount{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--brass-dim);margin-bottom:10px;}
  .question{font-size:19px;line-height:1.45;margin-bottom:20px;font-family:'Fraunces',Georgia,serif;}
  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:6px;}
  .opt{background:var(--slate-2);border:1px solid var(--rule);border-radius:8px;padding:14px 16px;cursor:pointer;font-size:14px;transition:transform .1s;}
  .opt:active{transform:scale(.97);}
  .opt.correct{border-color:var(--sage);background:rgba(22,164,74,.08);}
  .opt.wrong{border-color:var(--clay);background:rgba(244,63,94,.08);}
  .verdict{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin:16px 0 6px;}
  .verdict.correct{color:var(--sage);} .verdict.wrong{color:var(--clay);}
  .explain{font-size:14px;line-height:1.55;color:var(--parchment-dim);margin-bottom:20px;}
  .brief-block{margin-bottom:18px;}
  .brief-block .lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--brass-dim);margin-bottom:6px;}
  .brief-block p{font-size:14px;line-height:1.6;margin:0;}
  .loading{display:flex;align-items:center;gap:10px;color:var(--brass-dim);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:20px 0;}
  .spinner{width:14px;height:14px;border:2px solid var(--rule);border-top-color:var(--brass);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .summary-score{font-family:'IBM Plex Mono',monospace;font-size:44px;color:var(--brass);}
  .summary-label{color:var(--parchment-dim);font-size:13px;margin-top:4px;}
  .celebrate{background:linear-gradient(135deg, rgba(6,182,160,.14), rgba(255,122,41,.14));border:1px solid var(--brass-dim);border-radius:12px;padding:18px;text-align:center;margin-bottom:14px;animation:pop .5s cubic-bezier(.34,1.56,.64,1);}
  @keyframes pop{0%{transform:scale(.85);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .celebrate .big{font-family:'Fraunces',Georgia,serif;font-size:20px;margin-bottom:4px;}
  .celebrate .small{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--parchment-dim);}
  .freezechip{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--sky);background:rgba(47,125,224,.12);border-radius:10px;padding:3px 8px;margin-left:6px;}
  .task-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--rule);}
  .task-item:last-child{border-bottom:none;}
  .task-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--rule);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .task-check.done{background:var(--sage);border-color:var(--sage);}
  .task-body{flex:1;}
  .task-title{font-size:14px;}
  .task-title.done{color:var(--parchment-dim);text-decoration:line-through;}
  .task-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--parchment-dim);margin-top:2px;}
  .task-project{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 7px;border-radius:8px;background:var(--slate-2);color:var(--sky);}
  .navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:var(--slate);border-top:1px solid var(--rule);display:flex;padding:10px 18px 14px;gap:8px;}
  .navbtn{flex:1;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--parchment-dim);padding:8px 0;border-radius:8px;cursor:pointer;}
  .navbtn.active{color:var(--brass);background:var(--slate-2);}
  .muted{color:var(--parchment-dim);font-size:13px;line-height:1.6;}
  .chat-msgs{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;max-height:340px;overflow-y:auto;}
  .chat-msg{max-width:85%;padding:10px 13px;border-radius:12px;font-size:13.5px;line-height:1.5;}
  .chat-msg.user{align-self:flex-end;background:var(--brass);color:#fff;border-bottom-right-radius:3px;}
  .chat-msg.assistant{align-self:flex-start;background:var(--slate-2);border:1px solid var(--rule);border-bottom-left-radius:3px;}
  .chat-input-row{display:flex;gap:8px;}
  .chat-input-row input{flex:1;}
  .chat-input-row button{width:auto;padding:12px 16px;flex-shrink:0;}
  .chat-empty{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--parchment-dim);margin-bottom:14px;}
</style>

/* Math/calculator intensity — analyzed from the actual notes pasted for THIS reading,
   not guessed from its topic area, since it genuinely varies within a topic (e.g. some
   Fixed Income readings are pure definitions, others are all yield math). */
function estimateMathIntensity(notes){
  if(!notes || !notes.trim()) return null; // unknown until notes exist
  const text = notes.toLowerCase();
  let score = 0;
  const keywords = ['formula','calculate','calculation','compute','yield','duration','convexity',
    'npv','irr','wacc','eps','present value','future value','discount rate','annuity','basis point',
    'spread','ratio','regression','variance','standard deviation','probability','coefficient',
    'interest rate','compounding','amortiz','weighted average'];
  keywords.forEach(k=>{ if(text.includes(k)) score+=1; });
  const numberMatches = text.match(/\d+(\.\d+)?%?/g) || [];
  score += Math.min(numberMatches.length/8, 6);
  const symbolMatches = text.match(/[=×÷]|\bN\s*=|\bPV\s*=|\bFV\s*=|\bPMT\s*=/g) || [];
  score += Math.min(symbolMatches.length/4, 4);
  if(score>=10) return 'heavy';
  if(score>=4) return 'some';
  return 'light';
}
const MATH_TAG = {
  heavy:{label:'CALC HEAVY', cls:'clay'},
  some:{label:'SOME CALC', cls:'flame'},
  light:{label:'MOSTLY CONCEPTUAL', cls:'sage'}
};
function mathTagBadge(level){
  if(!level) return '';
  const t = MATH_TAG[level];
  return `<span class="pill" style="background:rgba(0,0,0,.04);color:var(--${t.cls});border:1px solid var(--${t.cls})">${t.label}</span>`;
}
/* Rolls up a "Reading N" chunk's individual module tags into one overall tag —
   only shown once every module in that chunk has notes and has been analyzed. */
function aggregateMathTag(items, progress){
  const levels = items.map(r=>(progress[r.num]||{}).mathTag);
  if(levels.some(l=>!l)) return null;
  const rank = {light:0, some:1, heavy:2};
  const avg = levels.reduce((s,l)=>s+rank[l],0)/levels.length;
  const level = avg>=1.5 ? 'heavy' : avg>=0.5 ? 'some' : 'light';
  return mathTagBadge(level);
}

async function curriculumStats(){
  const progress = await getProgress();
  let totalMinutes=0, remainingMinutes=0, completeCount=0, total=0;
  let chunkTotal=0, chunkComplete=0;
  const areaStats={};
  for(const area in CURRICULUM){
    const c=CURRICULUM[area];
    let areaComplete=0;
    const chunks = {};
    c.readings.forEach(r=>{
      const id=r.num; total++;
      const mins = r.minutes || FALLBACK_MINUTES;
      totalMinutes += mins;
      const st = (progress[id]||{}).status || 'not_started';
      if(st==='complete'){ completeCount++; areaComplete++; }
      else if(st==='in_progress'){ remainingMinutes += mins*0.5; }
      else { remainingMinutes += mins; }
      const readingNum = r.num.split('.')[0];
      chunks[readingNum] = chunks[readingNum] || [];
      chunks[readingNum].push(st==='complete');
    });
    Object.values(chunks).forEach(statuses=>{
      chunkTotal++;
      if(statuses.every(Boolean)) chunkComplete++;
    });
    areaStats[area] = {complete:areaComplete, total:c.readings.length};
  }
  const totalHours = totalMinutes/60;
  const remainingHours = remainingMinutes/60;
  return { remainingHours, totalHours, completeCount, total, chunkComplete, chunkTotal, pct: 1-(remainingHours/totalHours), areaStats };
}

async function longestStreakEver(){
  const act = await getActivity();
  const dates = Object.keys(act).filter(d=>act[d].total>0).sort();
  if(dates.length===0) return 0;
  let longest=1, run=1;
  for(let i=1;i<dates.length;i++){
    const prev = new Date(dates[i-1]); const cur = new Date(dates[i]);
    const diffDays = Math.round((cur-prev)/86400000);
    if(diffDays===1){ run++; longest=Math.max(longest,run); } else { run=1; }
  }
  return longest;
}

async function renderCFA(scroll){
  scroll.appendChild(el(`<div class="topbar"><h1>CFA Level I</h1></div>`));
  const importBtn = el(`<button class="btn secondary" style="margin-bottom:14px">Bulk import notes</button>`);
  importBtn.onclick = ()=>{ state.view='bulkimport'; render(); };
  scroll.appendChild(importBtn);
  const progress = await getProgress();
  const card = el(`<div class="card"></div>`);
  for(const area in CURRICULUM){
    const c = CURRICULUM[area];
    const completeCount = c.readings.filter(r=>(progress[r.num]||{}).status==='complete').length;
    const pct = completeCount/c.readings.length*100;
    const isOpen = !!state.areaOpen[area];
    // group by the natural reading number (the integer before the decimal) so a long
    // module list reads as a handful of readings instead of one flat wall of items
    const chunks = [];
    c.readings.forEach(r=>{
      const readingNum = r.num.split('.')[0];
      let chunk = chunks[chunks.length-1];
      if(!chunk || chunk.readingNum!==readingNum){ chunk = {readingNum, items:[]}; chunks.push(chunk); }
      chunk.items.push(r);
    });
    const areaMathTag = aggregateMathTag(c.readings, progress);
    const areaEl = el(`<div class="area">
      <div class="area-head" data-area="${area}">
        <div><div class="name">${c.name} ${areaMathTag||''}</div>
          <div class="meta">${completeCount}/${c.readings.length} · ${chunks.length} readings · exam weight ${c.weightPct}</div>
          <div class="area-progress"><div class="fill" style="width:${pct}%"></div></div></div>
        <span class="chevron ${isOpen?'open':''}">›</span>
      </div>
      <div class="reading-list ${isOpen?'open':''}" id="list-${area}"></div>
    </div>`);
    const list = areaEl.querySelector(`#list-${area}`);
    chunks.forEach(chunk=>{
      const chunkComplete = chunk.items.filter(r=>(progress[r.num]||{}).status==='complete').length;
      if(chunks.length>1){
        const chunkTag = aggregateMathTag(chunk.items, progress);
        list.appendChild(el(`<div style="display:flex;align-items:center;gap:8px;margin:14px 0 4px;padding-left:8px">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--brass-dim)">Reading ${chunk.readingNum} · ${chunkComplete}/${chunk.items.length}</span>
          ${chunkTag||''}
        </div>`));
      }
      chunk.items.forEach(r=>{
        const id = r.num;
        const st = (progress[id]||{}).status||'not_started';
        const hasNotes = !!((progress[id]||{}).notes||'').trim();
        const mTag = mathTagBadge((progress[id]||{}).mathTag);
        const item = el(`<div class="reading-item" data-id="${id}">
          <div class="rname"><span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--parchment-dim);margin-right:6px">${id}</span>${r.title}${hasNotes?' <span class="pill" style="background:rgba(6,182,160,.12);color:var(--brass-dim)">NOTES</span>':''}${mTag?' '+mTag:''}</div><span class="pill ${st}">${st.replace('_',' ')}</span>
        </div>`);
        item.onclick = (e)=>{ e.stopPropagation(); openReading(id); };
        list.appendChild(item);
      });
    });
    areaEl.querySelector('.area-head').onclick = ()=>{
      state.areaOpen[area] = !state.areaOpen[area];
      render();
    };
    card.appendChild(areaEl);
  }
  scroll.appendChild(card);
}

function renderBulkImport(scroll){
  const back = el(`<div class="backlink">‹ Back</div>`);
  back.onclick = ()=>{ state.view='home'; render(); };
  scroll.appendChild(back);
  scroll.appendChild(el(`<div class="eyebrow">Bulk import</div><h1 style="margin:6px 0 14px;font-size:20px">Paste notes for several readings at once</h1>`));
  scroll.appendChild(el(`<div class="card">
    <div class="muted" style="margin-bottom:14px">Mark the start of each reading with its module number on its own line, like <strong>## 27.1</strong> (extra words after the number are fine, e.g. "27.1 Key Concepts"). If you paste a whole-reading summary under just the reading number with no decimal — like <strong>## 28 Key Concepts</strong> — it applies to every sub-module under that reading automatically (28.1 through 28.5, etc). If a reading already has notes, it won't be touched — you'll get a one-click option to clear and replace it instead. This all stays in your browser; nothing is sent anywhere except when you actually start a lesson.</div>
    <label>Reading IDs, for reference</label>
    <div class="muted" style="margin-bottom:14px;max-height:120px;overflow-y:auto;font-family:'IBM Plex Mono',monospace;font-size:11px">${Object.keys(CURRICULUM).map(a=>`${CURRICULUM[a].name}: ${CURRICULUM[a].readings.map(r=>r.num).join(', ')}`).join('<br>')}</div>
    <label>Paste here</label>
    <textarea id="bulkInput" style="min-height:280px" placeholder="## 27.1
(paste that reading's content here)

## 28.1
(paste that reading's content here)"></textarea>
    <div style="height:14px"></div>
    <button class="btn" id="bulkSaveBtn">Save to readings</button>
    <div id="bulkResult" style="margin-top:12px"></div>
  </div>`));
  document.getElementById('bulkSaveBtn').onclick = async ()=>{
    const raw = document.getElementById('bulkInput').value;
    const allIds = allReadingIds();
    const parts = raw.split(/^##\s*/m).map(s=>s.trim()).filter(Boolean);
    const progress = await getProgress();

    const targets = {}; // id -> array of {label, body}
    const unmatched = [];
    const addTarget = (id, label, body)=>{ targets[id] = targets[id]||[]; targets[id].push({label, body}); };

    parts.forEach(part=>{
      const firstLineEnd = part.indexOf('\n');
      const idLineRaw = (firstLineEnd===-1 ? part : part.slice(0,firstLineEnd)).trim();
      const body = (firstLineEnd===-1 ? '' : part.slice(firstLineEnd+1)).trim();
      if(!body){ if(idLineRaw) unmatched.push(idLineRaw); return; }
      const m = idLineRaw.match(/^(\d+(?:\.\d+)?)/);
      if(!m){ unmatched.push(idLineRaw); return; }
      const token = m[1];
      if(allIds.includes(token)){
        addTarget(token, null, body);
      } else if(!token.includes('.')){
        const matches = allIds.filter(id=>id.split('.')[0]===token);
        if(matches.length>0) matches.forEach(id=>addTarget(id, `Reading ${token} key concepts`, body));
        else unmatched.push(idLineRaw);
      } else {
        unmatched.push(idLineRaw);
      }
    });

    const saved = [];
    const conflicts = [];
    for(const id in targets){
      const combined = targets[id].map(b=> b.label ? `[${b.label}]\n${b.body}` : b.body).join('\n\n');
      const existing = ((progress[id]||{}).notes||'').trim();
      if(existing){
        conflicts.push({id, pendingBody: combined});
      } else {
        progress[id] = progress[id] || {status:'not_started', notes:'', wrongCount:0};
        progress[id].notes = combined;
        progress[id].mathTag = estimateMathIntensity(combined);
        if(progress[id].status==='not_started') progress[id].status='in_progress';
        saved.push(id);
      }
    }
    await saveProgress(progress);

    const resultEl = document.getElementById('bulkResult');
    resultEl.innerHTML = '';
    if(saved.length>0) resultEl.appendChild(el(`<div class="muted" style="margin-bottom:8px">Saved: ${saved.join(', ')}</div>`));
    if(unmatched.length>0) resultEl.appendChild(el(`<div class="muted" style="margin-bottom:8px">Didn't recognize: ${unmatched.join(', ')}</div>`));
    if(conflicts.length>0){
      resultEl.appendChild(el(`<div class="muted" style="margin-bottom:8px">Already has notes — nothing changed. Clear to replace:</div>`));
      conflicts.forEach(c=>{
        const row = el(`<div class="row" style="margin-bottom:8px;align-items:center">
          <span class="pill in_progress" style="flex-shrink:0">${c.id}</span>
          <button class="btn small secondary" style="flex:1">Clear existing &amp; save new</button>
        </div>`);
        row.querySelector('button').onclick = async ()=>{
          const fresh = await getProgress();
          fresh[c.id] = fresh[c.id] || {status:'not_started', notes:'', wrongCount:0};
          fresh[c.id].notes = c.pendingBody;
          fresh[c.id].mathTag = estimateMathIntensity(c.pendingBody);
          if(fresh[c.id].status==='not_started') fresh[c.id].status='in_progress';
          await saveProgress(fresh);
          row.outerHTML = `<div class="muted" style="margin-bottom:6px">✓ ${c.id} updated</div>`;
        };
        resultEl.appendChild(row);
      });
    }
    if(saved.length===0 && unmatched.length===0 && conflicts.length===0){
      resultEl.textContent = 'Nothing to save — check the ## ID markers match the list above.';
    }
  };
}

  }

      msgsEl.appendChild(el(`<div class="chat-msg assistant">Couldn't get an answer just then — try again.</div>`));
    }
    sendBtn.disabled=false; sendBtn.textContent='Ask';
  };
  sendBtn.onclick = doSend;
  chatInput.onkeydown = (e)=>{ if(e.key==='Enter') doSend(); };
}

async function startQuizFromBank(id, areaName){
  state.readingId=id; state.reviewMode=true; state.view='quizLoading'; render();
  const bank = await getWrongBank(id);
  state.questions = bank.map(w=>({stem:w.stem, choices:w.choices}));
  state.current=0; state.results=[]; state.selected=null; state.answered=false;
  state.view='quiz'; render();
}

function renderQuiz(scroll){
  const q=state.questions[state.current]; const total=state.questions.length;
  const ticks = state.questions.map((_,i)=>{
    let cls='tick';
    if(i<state.current) cls+= state.results[i].correct?' correct':' wrong';
    else if(i===state.current) cls+=' current';
    return `<div class="${cls}"></div>`;
  }).join('');
  const optsHtml = q.choices.map(c=>`<div class="opt" data-label="${c.label}"><strong>${c.label})</strong> ${c.text}</div>`).join('');
  const card = el(`<div class="card">
    <div class="ledger">${ticks}</div>
    <div class="qcount">${state.reviewMode?'REVIEW · ':''}Q${state.current+1} / ${total}</div>
    <div class="question">${q.stem}</div>
    <div class="options">${optsHtml}</div>
    <div id="feedback"></div>
    <div id="nextRow" style="display:none;margin-top:8px"><button class="btn" id="nextBtn"></button></div>
  </div>`);
  scroll.appendChild(card);
  if(state.answered) showAnswered(card,q);
  else card.querySelectorAll('.opt').forEach(o=>{ o.onclick=()=>answerQuestion(o.getAttribute('data-label')); });

  renderQuizAsk(scroll, q);
}

function renderQuizAsk(scroll, q){
  const toggle = el(`<div class="backlink" id="askToggle" style="margin-bottom:14px">Stuck on this? Ask Claude</div>`);
  scroll.appendChild(toggle);
  const panel = el(`<div class="card" style="display:none" id="askPanel">
    <div class="chat-msgs" id="quizChatMsgs"></div>
    <div class="chat-input-row"><input type="text" id="quizChatInput" placeholder="Ask about this question or the reading"/><button class="btn" id="quizChatSend">Ask</button></div>
  </div>`);
  scroll.appendChild(panel);
  let open = false;
  toggle.onclick = async ()=>{
    open = !open;
    panel.style.display = open ? 'block' : 'none';
    if(open){
      const id = state.readingId;
      const history = await getChat(id);
      const msgsEl = panel.querySelector('#quizChatMsgs');
      msgsEl.innerHTML='';
      if(history.length===0) msgsEl.appendChild(el(`<div class="chat-empty">Ask about this question, the reading, or anything unclear.</div>`));
      else history.forEach(m=>{ msgsEl.appendChild(el(`<div class="chat-msg ${m.role==='user'?'user':'assistant'}">${m.text}</div>`)); });
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }
  };
  const sendBtn = panel.querySelector('#quizChatSend');
  const input = panel.querySelector('#quizChatInput');
  const doSend = async ()=>{
    const question = input.value.trim();
    if(!question) return;
    const id = state.readingId;
    const area = areaOf(id);
    const msgsEl = panel.querySelector('#quizChatMsgs');
    const history = await getChat(id);
    history.push({role:'user', text: `(While on quiz question: "${q.stem}") ${question}`});
    await saveChat(id, history);
    input.value='';
    sendBtn.disabled=true; sendBtn.textContent='…';
    msgsEl.appendChild(el(`<div class="chat-msg user">${question}</div>`));
    msgsEl.scrollTop = msgsEl.scrollHeight;
    try{
      const notesNow = (await getProgress())[id]?.notes || '';
      const answer = await askAboutReading(id, CURRICULUM[area].name, notesNow, history.slice(0,-1), history[history.length-1].text);
      const h2 = await getChat(id);
      h2.push({role:'assistant', text:answer});
      await saveChat(id, h2);
      msgsEl.appendChild(el(`<div class="chat-msg assistant">${answer}</div>`));
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }catch(e){
      msgsEl.appendChild(el(`<div class="chat-msg assistant">Couldn't get an answer just then — try again.</div>`));
    }
    sendBtn.disabled=false; sendBtn.textContent='Ask';
  };
  sendBtn.onclick = doSend;
  input.onkeydown = (e)=>{ if(e.key==='Enter') doSend(); };
}
function answerQuestion(label){
  const q=state.questions[state.current];
  const correct = q.choices.find(c=>c.label===label).correct;
  state.results[state.current]={correct};
  state.selected=label; state.answered=true; render();
}
function showAnswered(card,q){
  card.querySelectorAll('.opt').forEach(o=>{
    const label = o.getAttribute('data-label');
    const choice = q.choices.find(c=>c.label===label);
    if(choice.correct) o.classList.add('correct');
    else if(label===state.selected) o.classList.add('wrong');
  });
  const correct = state.results[state.current].correct;
  const explainHtml = q.choices.map(c=>`
    <div style="margin-bottom:10px">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:${c.correct?'var(--sage)':'var(--clay)'}">${c.label}${c.correct?' — correct':''}</span>
      <div class="explain" style="margin-bottom:0">${c.explain}</div>
    </div>`).join('');
  card.querySelector('#feedback').innerHTML = `<div class="verdict ${correct?'correct':'wrong'}">${correct?'Correct':'Incorrect'}</div>${explainHtml}`;
  const nextRow = card.querySelector('#nextRow'); nextRow.style.display='block';
  const nextBtn = card.querySelector('#nextBtn');
  nextBtn.textContent = state.current+1<state.questions.length ? 'Next':'Finish';
  nextBtn.onclick = async ()=>{
    const id = state.readingId;
    if(!correct && !state.reviewMode){
      const bank = await getWrongBank(id);
      bank.push({stem:q.stem, choices:q.choices});
      await saveWrongBank(id,bank);
    }
    if(correct && state.reviewMode){
      const bank = await getWrongBank(id);
      await saveWrongBank(id, bank.filter(w=>w.stem!==q.stem));
    }
    if(state.current+1<state.questions.length){ state.current++; state.selected=null; state.answered=false; render(); }
    else await finishLesson();
  };
}
async function finishLesson(){
  const id = state.readingId;
  const score = state.results.filter(r=>r.correct).length;
  await logActivity(state.questions.length, areaOf(id));
  const bank = await getWrongBank(id);
  const progress = await getProgress();
  progress[id] = progress[id] || {status:'in_progress', notes:'', wrongCount:0};
  progress[id].wrongCount = bank.length;
  if(!state.reviewMode && bank.length===0) progress[id].status='complete';
  await saveProgress(progress);
  state.finalScore = score; state.view='summary'; render();
}
async function findNextReading(afterId){
  const progress = await getProgress();
  const ids = allReadingIds();
  const startIdx = afterId ? ids.indexOf(afterId)+1 : 0;
  for(let i=startIdx;i<ids.length;i++){
    const st=(progress[ids[i]]||{}).status;
    if(st!=='complete') return ids[i];
  }
  for(let i=0;i<startIdx;i++){
    const st=(progress[ids[i]]||{}).status;
    if(st!=='complete') return ids[i];
  }
  return null;
}

async function renderSummary(scroll){
  const total = state.questions.length;
  const id = state.readingId;
  const bank = await getWrongBank(id);
  const streak = await computeStreak();
  if(MILESTONES.includes(streak)){
    scroll.appendChild(el(`<div class="celebrate"><div class="big">${streak}-day streak</div><div class="small">That's a real run — keep it going</div></div>`));
  }
  scroll.appendChild(el(`<div class="card" style="text-align:center;padding:32px 20px">
    <div class="summary-score">${state.finalScore}/${total}</div>
    <div class="summary-label">${readingName(id)}${state.reviewMode?' — review round':''}</div>
  </div>`));
  if(bank.length>0){
    const exportBtn = el(`<button class="btn secondary" style="margin-bottom:10px">Export ${bank.length} wrong answers to Anki</button>`);
    exportBtn.onclick = ()=>exportAnki(id, bank);
    scroll.appendChild(exportBtn);
  }

  const nextId = await findNextReading(id);
  if(nextId){
    const keepGoingBtn = el(`<button class="btn" style="margin-bottom:10px">Keep going → ${readingName(nextId)}</button>`);
    keepGoingBtn.onclick = ()=>{ state.readingId = nextId; state.view='reading'; render(); };
    scroll.appendChild(keepGoingBtn);
  }
  const backBtn = el(`<button class="btn secondary">Back to CFA</button>`);
  backBtn.onclick = ()=>{ state.view='home'; state.tab='cfa'; render(); };
  scroll.appendChild(backBtn);
}
async function renderWrongBank(scroll){
  const id = state.readingId;
  const area = areaOf(id);
  const bank = await getWrongBank(id);
  const back = el(`<div class="backlink">‹ Back</div>`);
  back.onclick = ()=>{ state.view='reading'; render(); };
  scroll.appendChild(back);
  scroll.appendChild(el(`<div class="eyebrow">Wrong answers bank</div><h1 style="margin:6px 0 18px;font-size:19px">${readingName(id)}</h1>`));

  if(bank.length===0){
    scroll.appendChild(el(`<div class="card"><div class="muted">Nothing cached here — this fills up automatically whenever you miss a question in a lesson.</div></div>`));
    return;
  }

  const actions = el(`<div class="row" style="margin-bottom:16px">
    <button class="btn small secondary" id="practiceBtn" style="flex:1">Practice these ${bank.length}</button>
    <button class="btn small secondary" id="exportBtn2" style="flex:1">Export to Anki</button>
  </div>`);
  scroll.appendChild(actions);
  document.getElementById('practiceBtn').onclick = ()=> startQuizFromBank(id, CURRICULUM[area].name);
  document.getElementById('exportBtn2').onclick = ()=> exportAnki(id, bank);

  bank.forEach((w, idx)=>{
    const card = el(`<div class="card"></div>`);
    card.appendChild(el(`<div class="question" style="font-size:15px;margin-bottom:14px">${w.stem}</div>`));
    w.choices.forEach(c=>{
      card.appendChild(el(`<div style="margin-bottom:10px">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:${c.correct?'var(--sage)':'var(--parchment-dim)'}">${c.label}) ${c.text}${c.correct?' — correct':''}</span>
        <div class="explain" style="margin-bottom:0;margin-top:2px">${c.explain}</div>
      </div>`));
    });
    const removeBtn = el(`<button class="btn secondary small">Remove from bank</button>`);
    removeBtn.onclick = async ()=>{
      const fresh = await getWrongBank(id);
      const filtered = fresh.filter((_,i2)=>i2!==idx);
      await saveWrongBank(id, filtered);
      const progress = await getProgress();
      if(progress[id]){ progress[id].wrongCount = filtered.length; await saveProgress(progress); }
      render();
    };
    card.appendChild(removeBtn);
    scroll.appendChild(card);
  });
}

function exportAnki(id, bank){
  const lines = bank.map(w=>{
    const front = w.stem.replace(/\t/g,' ').replace(/\n/g,' ');
    const correctChoice = w.choices.find(c=>c.correct);
    const back = `${correctChoice.label}) ${correctChoice.text} — ${correctChoice.explain}`.replace(/\t/g,' ').replace(/\n/g,' ');
    return `${front}\t${back}`;
  });
  const blob = new Blob([lines.join('\n')], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`cfa-${id}-anki.txt`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

document.querySelectorAll('.navbtn').forEach(b=>{ b.onclick=()=>{ state.tab=b.dataset.tab; state.view='home'; render(); }; });
(async ()=>{ await pullFromCloud(); await render(); })();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(console.warn);
}
</script>
